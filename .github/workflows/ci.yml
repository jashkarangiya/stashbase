name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  source-build:
    name: Source build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python sidecar dependencies
        run: pnpm setup:python

      - name: Test Python sidecars
        run: pnpm test:python

      - name: Test release CI gate
        run: pnpm test:release-gate

      - name: Typecheck server + mcp
        run: pnpm exec tsc --noEmit

      - name: Typecheck renderer (web-src)
        run: pnpm exec tsc --noEmit -p web-src/tsconfig.json

      - name: Build web + server
        run: pnpm build
