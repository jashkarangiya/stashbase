name: Release Linux

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the Debian package to, for example v0.9.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-ci-gate:
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/release-ci-gate.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && (startsWith(inputs.tag, 'v') && inputs.tag || format('v{0}', inputs.tag)) || github.event.release.tag_name }}

  linux-deb:
    needs: release-ci-gate
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && (startsWith(inputs.tag, 'v') && inputs.tag || format('v{0}', inputs.tag)) || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Validate release tag
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "::error::release tag $RELEASE_TAG does not match package.json version $expected"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux Python sidecar
        run: pnpm build:python-extract-sidecar

      - name: Build Debian package
        env:
          GH_TOKEN: ${{ github.token }}
          STASHBASE_REQUIRE_EXTRACT: '1'
        run: STASHBASE_SKIP_SIDECAR_BUILD=1 pnpm dist:linux

      - name: Smoke packaged Linux server
        env:
          STASHBASE_REQUIRE_EXTRACT: '1'
        run: node scripts/smoke-packaged-server.mjs --require-extract

      - name: Upload Debian package to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" release.nosync/*.deb --repo "$GITHUB_REPOSITORY" --clobber
