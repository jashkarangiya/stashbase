name: Release Linux

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the Debian package to, for example v0.9.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-deb:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v3
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux Python sidecar
        run: pnpm build:python-sidecar

      - name: Build Debian package
        run: STASHBASE_SKIP_SIDECAR_BUILD=1 pnpm dist:linux

      - name: Upload Debian package to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" release.nosync/*.deb --repo "$GITHUB_REPOSITORY" --clobber
