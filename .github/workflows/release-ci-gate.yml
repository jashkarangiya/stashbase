name: Release CI gate

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag whose exact commit must have a successful source CI run
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  require-green-ci:
    runs-on: ubuntu-latest
    steps:
      # The gate implementation comes from the default branch so manual backfills
      # can validate older release tags that predate this script.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Require successful CI for release commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: node scripts/require-green-ci.mjs "$RELEASE_TAG"
