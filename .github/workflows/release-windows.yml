name: Release Windows

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the Windows assets to, for example v0.9.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-ci-gate:
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/release-ci-gate.yml
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && (startsWith(inputs.tag, 'v') && inputs.tag || format('v{0}', inputs.tag)) || github.event.release.tag_name }}

  windows-installer:
    needs: release-ci-gate
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && (startsWith(inputs.tag, 'v') && inputs.tag || format('v{0}', inputs.tag)) || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            tar
            xz
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-nodejs
            mingw-w64-x86_64-pkgconf

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $expected = "v$version"
          if ($env:RELEASE_TAG -ne $expected) {
            Write-Error "release tag $env:RELEASE_TAG does not match package.json version $expected"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows Python sidecars
        run: pnpm build:python-extract-sidecar

      - name: Build Windows transcription sidecar
        shell: msys2 {0}
        run: bash scripts/build-transcription-sidecar.sh

      - name: Build Windows installer
        env:
          STASHBASE_REQUIRE_EXTRACT: '1'
          STASHBASE_SKIP_SIDECAR_BUILD: '1'
          STASHBASE_SKIP_TRANSCRIPTION_BUILD: '1'
        run: pnpm dist:win

      - name: Smoke packaged Windows server
        env:
          STASHBASE_REQUIRE_EXTRACT: '1'
        run: node scripts/smoke-packaged-server.mjs --require-extract --require-transcription

      - name: Upload Windows assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path release.nosync -File |
            Where-Object { $_.Name -match '\.(exe|zip)$' -and $_.Length -gt 0 }

          if (-not $artifacts) {
            Write-Error "No Windows release artifacts found in release.nosync"
            exit 1
          }

          $artifactPaths = @($artifacts | ForEach-Object { $_.FullName })
          gh release upload $env:RELEASE_TAG @artifactPaths --repo $env:GITHUB_REPOSITORY --clobber
