<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; img-src data:; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline';">
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f8fafc;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
    }

    header {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(248, 250, 252, 0.92);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    h1 {
      font-size: 15px;
      font-weight: 650;
      margin: 0;
    }

    #refresh {
      border: 1px solid #d1d5db;
      background: white;
      color: #111827;
      border-radius: 6px;
      height: 30px;
      padding: 0 10px;
      font: inherit;
      cursor: pointer;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .source {
      border: 1px solid #d9dee7;
      border-radius: 8px;
      background: white;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .source:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.14);
    }

    .source img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: contain;
      background: #e5e7eb;
      border-radius: 5px;
      display: block;
    }

    .name {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #empty {
      padding: 28px 18px;
      color: #6b7280;
      font-size: 13px;
    }

    #error {
      margin: 14px 16px 0;
      padding: 9px 10px;
      border: 1px solid #fecaca;
      border-radius: 6px;
      background: #fef2f2;
      color: #991b1b;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Choose a window to capture</h1>
    <button id="refresh" type="button">Refresh</button>
  </header>
  <div id="error" hidden></div>
  <main id="grid"></main>
  <div id="empty" hidden>No capturable windows found.</div>
  <script>
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const errorBox = document.getElementById('error');
    const refresh = document.getElementById('refresh');
    const title = document.getElementById('title');
    const action = new URLSearchParams(window.location.search).get('action') === 'record'
      ? 'record'
      : 'capture';
    title.textContent = action === 'record' ? 'Choose a window to record' : 'Choose a window to capture';

    function showError(message) {
      errorBox.textContent = message;
      errorBox.hidden = false;
    }

    async function loadSources() {
      grid.innerHTML = '';
      empty.hidden = true;
      errorBox.hidden = true;
      let response;
      try {
        response = await window.electron.listCaptureWindows();
      } catch (err) {
        showError(err && err.message ? err.message : 'Could not list windows.');
        return;
      }
      const sources = Array.isArray(response) ? response : response?.sources || [];
      if (response && !Array.isArray(response) && response.ok === false) {
        showError(response.message || response.error || 'Could not list capturable windows.');
        return;
      }
      if (!sources.length) {
        empty.hidden = false;
        return;
      }
      for (const source of sources) {
        const button = document.createElement('button');
        button.className = 'source';
        button.type = 'button';
        button.title = source.name;
        button.innerHTML = '<img alt=""><div class="name"></div>';
        button.querySelector('img').src = source.thumbnail;
        button.querySelector('img').alt = source.name;
        button.querySelector('.name').textContent = source.name;
        button.addEventListener('click', async () => {
          button.disabled = true;
          const result = action === 'record'
            ? await window.electron.startWindowRecording({
                sourceId: source.id,
                sourceName: source.name,
              })
            : await window.electron.capture({ mode: 'window', sourceId: source.id });
          if (!result || result.ok !== true) {
            button.disabled = false;
            showError(result?.message || result?.error || (action === 'record' ? 'Window recording failed.' : 'Window capture failed.'));
          }
        });
        grid.appendChild(button);
      }
    }

    refresh.addEventListener('click', loadSources);
    loadSources();
  </script>
</body>
</html>
